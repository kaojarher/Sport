<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬尾少女田徑錦標賽 (大卡片比例修正版)</title>
    <style>
        :root {
            --primary: #4CAF50;
            --dark: #2E7D32;
            --accent: #FFC107;
            --bg-grid-0: url('sport0.png'); 
            --bg-grid-1: url('sport1.png'); 
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f1; margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        h1 { color: #333; margin: 5px 0 10px 0; font-size: 1.5rem; text-align: center; }
        .view-panel { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 780px; text-align: center; position: relative;}
        .hidden { display: none !important; }
        h3 { font-size: 1.1rem; margin-top: 5px; color: #2e7d32; }
        p { font-size: 0.9rem; color: #666; margin: 5px 0; }

        /* 頂部控制列 */
        .top-control-bar {
            width: 100%; max-width: 780px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; background: #fff; padding: 8px 15px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .music-btn {
            background: #ffecb3; border: 1px solid #ffe082; color: #b78103; padding: 6px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; cursor: pointer;
        }
        .db-action-group { display: flex; gap: 8px; }
        .db-btn { background: #f5f5f5; border: 1px solid #ccc; color: #333; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 500; }

        /* 模式切換按鈕 */
        .mode-selector { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .mode-tab { padding: 8px 20px; border: 2px solid var(--primary); background: white; color: var(--dark); font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .mode-tab.active { background: var(--primary); color: white; }

        /* 選手海選網格 */
        .grid-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; perspective: 1500px; }
        @media (min-width: 500px) { .grid-select { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 680px) { .grid-select { grid-template-columns: repeat(7, 1fr); gap: 8px; } }

        .character-card { height: 140px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .character-card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: space-between; border-radius: 8px; border: 2px solid #ddd; padding: 6px; background: #fafafa; }
        .card-front { z-index: 2; transform: rotateY(0deg); cursor: pointer; }
        .card-front .avatar { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--primary); display: inline-block; background-size: 700% 300%; background-repeat: no-repeat; }
        .character-card.selected .card-front { border-color: var(--accent); background: #fff8e1; }
        .character-card.selected-captain .card-front { border-color: #ff5252; background: #ffebee; }
        .character-card.selected-captain .card-front::after { content: '★隊長'; position: absolute; top: 2px; right: 2px; background: #ff5252; color: white; font-size: 8px; padding: 1px 3px; border-radius: 3px; }
        .card-front p { margin: 2px 0; font-size: 11px; font-weight: bold; color: #333;}
        .card-back { transform: rotateY(180deg); background: #fff; }
        .card-back .avatar { width: 100%; height: 55px; border-radius: 4px; background-size: 700% 300%; background-repeat: no-repeat; }
        .card-back .mini-stats { font-size: 9px; color: #555; text-align: left; width: 100%; line-height: 1.2; margin: 2px 0; }

        /* 跑道區域 */
        .status-announcement { background: #e8f5e9; border-left: 5px solid var(--primary); padding: 10px; margin: 10px 0; border-radius: 4px; text-align: left; font-size: 0.95rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 35px; font-size: 16px; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 320px; margin: 10px auto; display: block; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 直線跑道容器 */
        .track-container-straight { background: #e0d0b0; padding: 0 10px; border-radius: 8px; margin: 15px 0; position: relative; overflow: hidden; width: 100%; height: 55vh; display: flex; justify-content: space-around; border: 4px solid #3e2723; }
        .lane { flex: 1; margin: 0 2px; height: 100%; border-right: 2px dashed rgba(255,255,255,0.5); border-left: 2px dashed rgba(255,255,255,0.5); position: relative; background: #d15b3d; }
        .lane-num { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-weight: bold; font-size: 20px; z-index: 1; }
        
        /* 跑者實體節點 */
        .runner-straight { position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; z-index: 5; }
        .runner-straight .avatar { width: 44px; height: 44px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); border-radius: 50%; border: 2px solid white; background-size: 700% 300%; background-repeat: no-repeat; transition: transform 0.2s ease; }
        .runner-straight .lane-tag { background: rgba(0, 0, 0, 0.75); color: white; font-size: 8px; padding: 1px 4px; border-radius: 3px; margin-top: 2px; white-space: nowrap; text-align: center; max-width: 75px; overflow: hidden;}

        /* 上下折返線 */
        .line-mark-top { position: absolute; top: 50px; left: 0; width: 100%; height: 6px; background: repeating-linear-gradient(90deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 1; opacity: 0.8; }
        .line-mark-bottom { position: absolute; bottom: 50px; left: 0; width: 100%; height: 6px; background: repeating-linear-gradient(90deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 1; opacity: 0.8; }

        /* 頒獎台 */
        .podium { display: flex; justify-content: center; align-items: flex-end; margin: 20px 0; height: 160px; }
        .podium-place { display: flex; flex-direction: column; align-items: center; margin: 0 8px; width: 85px; }
        .podium-place .avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid white; background-size: 700% 300%; background-repeat: no-repeat; }
        .podium-block { width: 100%; color: white; font-weight: bold; font-size: 16px; display: flex; justify-content: center; align-items: center; margin-top: 8px; border-radius: 6px 6px 0 0; text-align: center; padding: 4px 0; }
        .p-1 { height: 80px; background: #ffd700; order: 2; }
        .p-2 { height: 60px; background: #c0c0c0; order: 1; }
        .p-3 { height: 40px; background: #cd7f32; order: 3; }
        
        .result-list { text-align: left; width: 100%; max-width: 420px; margin: 0 auto 15px auto; }
        .result-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
        .result-item strong { min-width: 65px; font-size: 0.9rem; }
        .result-item span { margin-left: 15px; font-weight: bold; font-size: 0.9rem; flex: 1; }
        .result-item .avatar { border-radius: 50%; background-size: 700% 300%; background-repeat: no-repeat; border: 1px solid #ccc; }
        
        /* 交互按鈕 */
        .card-actions { display: flex; gap: 4px; width: 100%; justify-content: space-between; }
        .action-sub-btn { padding: 3px 0; font-size: 9px; border: none; border-radius: 4px; background: #e0e0e0; font-weight: bold; cursor: pointer; text-align: center;}
        .action-sub-btn.join-btn { background: var(--primary); color: white; width: 45%; }
        .action-sub-btn.flip-btn { background: #cfd8dc; color: #37474f; width: 45%; }
        .action-sub-btn.full-btn { background: #37474f; color: white; width: 100%; margin-top: 3px;}
        .clear-db-btn { background: none; border: none; color: #ff5252; text-decoration: underline; font-size: 11px; cursor: pointer; margin-top: 15px; display: block; margin-left: auto; margin-right: auto;}

        /* ==================== 🔎 全螢幕彈窗 (修正長寬比與 3D 效果) ==================== */
        .fullscreen-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; padding: 15px;}
        .fullscreen-overlay.active { opacity: 1; pointer-events: auto; }
        
        /* 大卡片容器修正：維持與小卡片相同的直式比例 (寬 260px : 高 380px) */
        .fullscreen-card-container { width: 260px; height: 380px; perspective: 1500px; cursor: pointer; margin-bottom: 15px; }
        .fullscreen-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .fullscreen-card.flipped { transform: rotateY(180deg); }
        
        .fs-face-front, .fs-face-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; overflow: hidden; border: 4px solid white; background: #fafafa; }
        .fs-face-front { z-index: 2; transform: rotateY(0deg); }
        .fs-face-back { transform: rotateY(180deg); }
        
        /* 大頭照背景在垂直方向拉高後填滿，並完美重現大廳精準裁切 */
        .fs-avatar { width: 100%; height: 100%; background-size: 700% 300%; background-repeat: no-repeat; }
        
        /* 數據浮層提示 */
        .stat-overlay { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); color: #333; text-align: center; }
        .stat-grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
        .stat-text { background: #f5f5f5; padding: 6px; border-radius: 4px; text-align: left; padding-left: 12px;}
        .stat-text span { color: #d32f2f; font-weight: bold; font-size: 15px; font-family: monospace; }
        .fs-tip { font-size: 11px; color: #777; margin: 4px 0 10px 0; font-style: italic; }
        .close-fs-btn { background: #ff5252; color: white; border: none; padding: 8px 20px; font-size: 12px; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <h1>🏃‍♀️ 馬尾少女田徑綜合體育場 🏁</h1>

    <!-- 頂部控制列 -->
    <div class="top-control-bar">
        <button class="music-btn" id="music-toggle-btn" onclick="toggleSynthMusic(event)">🎮 啟動晶片音效：Lobby 模式 🔌</button>
        <div class="db-action-group">
            <button class="db-btn" onclick="exportJSON()">📥 備份 JSON</button>
            <button class="db-btn" onclick="document.getElementById('import-input').click()">📤 還原 JSON</button>
            <input type="file" id="import-input" accept=".json" class="hidden" onchange="importJSON(this)">
        </div>
    </div>

    <!-- 模式選擇 -->
    <div class="mode-selector" id="mode-selector-bar">
        <button class="mode-tab active" id="tab-single" onclick="switchGameMode('single')">🥇 個人單人預決賽 (6人)</button>
        <button class="mode-tab" id="tab-relay" onclick="switchGameMode('relay')">🔥 1600m 大隊接力 (上下折返跑)</button>
    </div>

    <!-- 步驟一：海選組隊大廳 -->
    <div id="setup-view" class="view-panel">
        <h3 id="lobby-title">【個人賽大廳】請挑選 6 位選手參加預賽</h3>
        <p id="select-tip">目前已選擇：0 / 6 位</p>
        <div class="grid-select" id="grid-select"></div>
        <button id="start-btn" class="btn" disabled onclick="triggerRaceStart()">鳴槍！開始比賽</button>
        <button class="clear-db-btn" onclick="clearData()">⚠️ 清除所有選手地端戰績</button>
    </div>

    <!-- 步驟二：賽事進行中 -->
    <div id="race-view" class="view-panel hidden">
        <h3 id="race-title">賽事現場進行中...</h3>
        <div class="status-announcement" id="race-announcement">準備中...</div>
        
        <!-- 直線體育場 -->
        <div class="track-container-straight" id="track-straight">
            <div class="line-mark-top" id="line-top"></div>
            <div class="line-mark-bottom" id="line-bottom"></div>
        </div>

        <button id="next-stage-btn" class="btn hidden" onclick="advanceStage()">前進下一步驟</button>
    </div>

    <!-- 步驟三：結算頒獎 -->
    <div id="result-view" class="view-panel hidden">
        <h2 id="result-header">🏆 最終排名 🏆</h2>
        <p>（戰績數據已即時同步更新保存至選手卡中）</p>
        <div class="podium" id="podium"></div>
        <div class="result-list" id="result-list"></div>
        <button class="btn" onclick="resetGame()">返回海選大廳</button>
    </div>

    <!-- ==================== 🔎 全螢幕大卡片彈窗元件 ==================== -->
    <div class="fullscreen-overlay" id="fs-overlay" onclick="closeFullscreen()">
        <!-- 點擊大卡片會觸發 3D 翻轉，並阻止事件冒泡以免關閉視窗 -->
        <div class="fullscreen-card-container" onclick="event.stopPropagation(); flipFullscreenCard();">
            <div class="fullscreen-card" id="fs-card">
                <div class="fs-face-front"><div class="fs-avatar" id="fs-img-front"></div></div>
                <div class="fs-face-back"><div class="fs-avatar" id="fs-img-back"></div></div>
            </div>
        </div>
        <!-- 下方數據浮層 -->
        <div class="stat-overlay" onclick="event.stopPropagation();">
            <p class="card-back-title" id="fs-title" style="margin:2px 0; font-weight:bold; color:var(--dark); font-size:16px;">選手戰績</p>
            <p class="fs-tip">💡 點擊上方大卡片可使卡片 3D 翻面</p>
            <div class="stat-grid-layout">
                <div class="stat-text">總出賽次數：<span id="fs-stat-m">0</span> 次</div>
                <div class="stat-text">個人晉級數：<span id="fs-stat-q">0</span> 次</div>
                <div class="stat-text">冠軍金牌數：<span id="fs-stat-g">0</span> 次</div>
                <div class="stat-text">個人最高名次：<span id="fs-stat-b">-</span></div>
            </div>
            <button class="close-fs-btn" onclick="closeFullscreen()">關閉放大卡片</button>
        </div>
    </div>

    <script>
        const totalRunners = 21;
        const cols = 7;
        let gameMode = 'single'; 
        const poolRunners = []; 
        let qualifiedRunners = []; 
        let currentGroupRunners = []; 
        let currentStage = 'Q1'; 
        let raceInterval;

        // 接力賽變數
        let relayTeams = []; 
        let relayStartTime = 0;

        /* ==================== ⚡ 核心：8-Bit 變頻晶片音效引擎 ==================== */
        let audioCtx = null;
        let sequencerStep = 0;
        let sequencerTimer = null;
        let isSynthMuted = true;
        let synthMode = 'lobby'; 
        let currentBatonLap = 1; 

        const lobbyMelody = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
        const lobbySequence = [0, 2, 4, 2, 5, 4, 2, 4, 7, 6, 5, 4, 3, 2, 1, 0];

        function toggleSynthMusic(event) {
            if (event) event.stopPropagation();
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isSynthMuted = !isSynthMuted;
            const btn = document.getElementById('music-toggle-btn');
            if (isSynthMuted) {
                btn.innerText = "🎮 音樂：已關閉 🔇"; btn.style.background = "#ffecb3"; stopSequencer();
            } else {
                btn.innerText = `🎮 音樂：電玩風格(${synthMode.toUpperCase()}) 🔊`; btn.style.background = "#e0f2f1"; audioCtx.resume(); startSequencer();
            }
        }

        function startSequencer() {
            stopSequencer();
            let tempo = synthMode === 'lobby' ? 130 : Math.max(40, 125 - (currentBatonLap * 25));
            sequencerTimer = setInterval(() => {
                if (isSynthMuted || !audioCtx) return;
                playSynthTone();
            }, tempo);
        }

        function playSynthTone() {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.type = 'square';

            if (synthMode === 'lobby') {
                const noteIndex = lobbySequence[sequencerStep % lobbySequence.length];
                osc.frequency.setValueAtTime(lobbyMelody[noteIndex], audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } else {
                const baseFreq = (sequencerStep % 4 === 0) ? 240 : (sequencerStep % 4 === 2 ? 480 : 360);
                const pitchShift = baseFreq + (currentBatonLap * 120) + (sequencerStep % 6) * 20;
                osc.frequency.setValueAtTime(pitchShift, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.07, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
            sequencerStep++;
        }

        function stopSequencer() { if (sequencerTimer) { clearInterval(sequencerTimer); sequencerTimer = null; } }
        
        function updateSynthState(mode, lap = 1) {
            synthMode = mode; currentBatonLap = lap;
            const btn = document.getElementById('music-toggle-btn');
            if(!isSynthMuted) {
                btn.innerText = `🎮 音樂：電玩風格(${mode.toUpperCase()}) 🔊`;
                startSequencer();
            }
        }

        /* ==================== 💾 地端歷史資料庫 ==================== */
        let statsDB = JSON.parse(localStorage.getItem('girl_athletes_hybrid_db_v3'));
        if (!statsDB) { initDefaultDB(); }
        function initDefaultDB() {
            statsDB = {};
            for (let i = 0; i < totalRunners; i++) {
                statsDB[i] = { matches: 0, qualified: 0, gold: 0, bestPlace: '-' };
            }
            localStorage.setItem('girl_athletes_hybrid_db_v3', JSON.stringify(statsDB));
        }

        function switchGameMode(mode) {
            gameMode = mode;
            poolRunners.length = 0; qualifiedRunners.length = 0;
            document.getElementById('tab-single').className = mode === 'single' ? 'mode-tab active' : 'mode-tab';
            document.getElementById('tab-relay').className = mode === 'relay' ? 'mode-tab active' : 'mode-tab';
            
            document.getElementById('lobby-title').innerText = mode === 'single' ? '【個人賽大廳】請挑選 6 位選手參加預賽' : '【1600m 大隊接力】請挑選 4 位組成代表隊 (第一位點擊者為隊長，壓軸跑第4棒逆向衝刺)';
            document.getElementById('start-btn').innerText = mode === 'single' ? '開始預賽 (第一組)' : '鳴槍！1600m 接力大賽開跑';
            
            updateSelectTip();
            renderCharacterCards();
        }

        function updateSelectTip() {
            const req = gameMode === 'single' ? 6 : 4;
            document.getElementById('select-tip').innerText = `目前已選擇：${poolRunners.length} / ${req} 位選手`;
            document.getElementById('start-btn').disabled = poolRunners.length !== req;
        }

        const gridSelect = document.getElementById('grid-select');
        renderCharacterCards();

        function renderCharacterCards() {
            gridSelect.innerHTML = '';
            for (let i = 0; i < totalRunners; i++) {
                const r = Math.floor(i / cols), c = i % cols;
                const posX = (c / (cols - 1)) * 100, posY = (r / (3 - 1)) * 100;
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'character-card'; cardWrapper.id = `card-wrapper-${i}`;

                const s = statsDB[i] || { matches: 0, qualified: 0, gold: 0, bestPlace: '-' };
                cardWrapper.innerHTML = `
                    <div class="card-front" onclick="flipCard(event, ${i})">
                        <div class="avatar" style="background-image: var(--bg-grid-0); background-position: ${posX}% ${posY}%;"></div>
                        <p>${i+1}號少女</p>
                        <div style="width:100%;" onclick="event.stopPropagation();">
                            <div class="card-actions">
                                <button class="action-sub-btn join-btn" onclick="handleSelect(event, ${i})">${gameMode==='single'?'參賽':'選入'}</button>
                                <button class="action-sub-btn flip-btn" onclick="flipCard(event, ${i})">戰績</button>
                            </div>
                            <button class="action-sub-btn full-btn" onclick="openFullscreen(${i}, ${posX}, ${posY})">🔎 放大數據</button>
                        </div>
                    </div>
                    <div class="card-back" onclick="event.stopPropagation(); flipCard(event, ${i})">
                        <div class="avatar" style="background-image: var(--bg-grid-1); background-position: ${posX}% ${posY}%;"></div>
                        <div class="mini-stats">場:${s.matches} 晉:${s.qualified}<br>冠:${s.gold} 最佳:${s.bestPlace}</div>
                        <button class="action-sub-btn flip-btn" style="width:100%; margin-top:2px;" onclick="event.stopPropagation(); flipCard(event, ${i})">返回正面</button>
                    </div>
                `;
                gridSelect.appendChild(cardWrapper);
            }
        }

        function flipCard(event, id) { event.stopPropagation(); document.getElementById(`card-wrapper-${id}`).classList.toggle('flipped'); }
        
        /* ==================== 🔎 放大與大卡片 3D 翻轉 ==================== */
        function openFullscreen(id, posX, posY) {
            const s = statsDB[id] || { matches: 0, qualified: 0, gold: 0, bestPlace: '-' };
            document.getElementById('fs-title').innerText = `🏃‍♀️ ${id+1}號 生涯歷史數據`;
            document.getElementById('fs-stat-m').innerText = s.matches;
            document.getElementById('fs-stat-q').innerText = s.qualified;
            document.getElementById('fs-stat-g').innerText = s.gold;
            document.getElementById('fs-stat-b').innerText = s.bestPlace;
            
            // 重設卡片角度（每次打開均顯示正面）
            document.getElementById('fs-card').classList.remove('flipped');
            
            document.getElementById('fs-img-front').style.backgroundImage = 'var(--bg-grid-0)';
            document.getElementById('fs-img-front').style.backgroundPosition = `${posX}% ${posY}%`;
            document.getElementById('fs-img-back').style.backgroundImage = 'var(--bg-grid-1)';
            document.getElementById('fs-img-back').style.backgroundPosition = `${posX}% ${posY}%`;
            
            document.getElementById('fs-overlay').classList.add('active');
        }
        
        function flipFullscreenCard() {
            document.getElementById('fs-card').classList.toggle('flipped');
        }
        
        function closeFullscreen() { 
            document.getElementById('fs-overlay').classList.remove('active'); 
        }

        function handleSelect(event, id) {
            event.stopPropagation();
            const card = document.getElementById(`card-wrapper-${id}`);
            const index = poolRunners.findIndex(r => r.id === id);
            const r = Math.floor(id / cols), c = id % cols;
            const posX = (c / (cols - 1)) * 100, posY = (r / (3 - 1)) * 100;

            if (index > -1) {
                poolRunners.splice(index, 1);
                card.className = 'character-card';
            } else {
                const limit = gameMode === 'single' ? 6 : 4;
                if (poolRunners.length >= limit) return;
                poolRunners.push({ id, name: `${id+1}號選手`, posX, posY });
            }

            document.querySelectorAll('.character-card').forEach(cc => {
                const cid = parseInt(cc.dataset.id || cc.id.replace('card-wrapper-',''));
                const pIdx = poolRunners.findIndex(pr => pr.id === cid);
                if(pIdx === -1) cc.className = 'character-card';
                else if(gameMode === 'relay' && pIdx === 0) cc.className = 'character-card selected-captain';
                else cc.className = 'character-card selected';
            });

            updateSelectTip();
        }

        function triggerRaceStart() {
            poolRunners.forEach(runner => { statsDB[runner.id].matches += 1; });
            localStorage.setItem('girl_athletes_hybrid_db_v3', JSON.stringify(statsDB));

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('mode-selector-bar').classList.add('hidden');
            document.getElementById('race-view').classList.remove('hidden');

            updateSynthState('race', 1);
            if (gameMode === 'single') {
                setupSingleRaceStage('Q1');
            } else {
                setupVerticalRelayRace();
            }
        }

        /* ==================== 🥇 直線引擎 (單人賽) ==================== */
        function setupSingleRaceStage(stage) {
            currentStage = stage;
            document.getElementById('next-stage-btn').classList.add('hidden');
            document.getElementById('line-top').style.display = 'block';
            document.getElementById('line-bottom').style.display = 'block';
            
            if (stage === 'Q1') {
                document.getElementById('race-title').innerText = `🏃‍♀️ 預賽 - 第一組 (取前2名晉級)`;
                currentGroupRunners = poolRunners.slice(0, 3);
            } else if (stage === 'Q2') {
                document.getElementById('race-title').innerText = `🏃‍♀️ 預賽 - 第二組 (取前2名晉級)`;
                currentGroupRunners = poolRunners.slice(3, 6);
            } else if (stage === 'F') {
                document.getElementById('race-title').innerText = `🔥 決賽最高殿堂 (個人四強金牌戰)`;
                currentGroupRunners = qualifiedRunners;
            }

            document.getElementById('race-announcement').innerText = "運動員已在上方起跑線就位，準備起跑！";
            
            const trackContainer = document.getElementById('track-straight');
            trackContainer.innerHTML = '<div class="line-mark-top"></div><div class="line-mark-bottom" style="bottom:60px;"></div>';

            currentGroupRunners.forEach((runner, idx) => {
                runner.progress = 20; 
                const lane = document.createElement('div'); lane.className = 'lane';
                lane.innerHTML = `<div class="lane-num">${idx + 1}</div>
                    <div class="runner-straight" id="runner-node-${idx}" style="top: 20px;">
                        <div class="avatar" style="background-image: var(--bg-grid-1); background-position: ${runner.posX}% ${runner.posY}%;"></div>
                        <div class="lane-tag">${runner.name}</div>
                    </div>`;
                trackContainer.appendChild(lane);
            });
            setTimeout(runSingleEngine, 1000);
        }

        function runSingleEngine() {
            const track = document.getElementById('track-straight');
            const limitY = track.clientHeight - 110; 
            raceInterval = setInterval(() => {
                let arriveCount = 0;
                currentGroupRunners.forEach((runner, idx) => {
                    if (runner.progress >= limitY) { arriveCount++; return; }
                    runner.progress += Math.random() * 9 + 4.0;
                    if (runner.progress > limitY) runner.progress = limitY;
                    document.getElementById(`runner-node-${idx}`).style.top = runner.progress + 'px';
                });
                if (arriveCount === currentGroupRunners.length) {
                    clearInterval(raceInterval); handleSingleStageEnd();
                }
            }, 50);
        }

        function handleSingleStageEnd() {
            const results = [...currentGroupRunners].sort((a, b) => b.progress - a.progress);
            const nextBtn = document.getElementById('next-stage-btn');
            const announcement = document.getElementById('race-announcement');

            if (currentStage === 'Q1' || currentStage === 'Q2') {
                statsDB[results[0].id].qualified += 1; statsDB[results[1].id].qualified += 1;
                localStorage.setItem('girl_athletes_hybrid_db_v3', JSON.stringify(statsDB));
                qualifiedRunners.push(results[0], results[1]);
                announcement.innerHTML = `🏁 <b>本組預賽結束！</b><br>晉級決賽：${results[0].name}、${results[1].name}`;
                nextBtn.innerText = currentStage === 'Q1' ? "進行預賽第二組" : "進入最終總決賽";
                nextBtn.classList.remove('hidden');
            } else if (currentStage === 'F') {
                announcement.innerText = "決賽落幕！正在計算最新名次存檔中...";
                results.forEach((runner, idx) => {
                    const place = idx + 1;
                    if (place === 1) statsDB[runner.id].gold += 1;
                    const curBest = statsDB[runner.id].bestPlace;
                    if (curBest === '-' || place < parseInt(curBest)) statsDB[runner.id].bestPlace = `第 ${place} 名`;
                });
                localStorage.setItem('girl_athletes_hybrid_db_v3', JSON.stringify(statsDB));
                setTimeout(() => showFinalPodiumDisplay(results), 1200);
            }
        }

        function advanceStage() {
            if (gameMode === 'single') {
                if (currentStage === 'Q1') setupSingleRaceStage('Q2');
                else if (currentStage === 'Q2') setupSingleRaceStage('F');
            } else {
                showFinalPodiumDisplay();
            }
        }


        /* ==================== 🔄 1600m 直線往返大隊接力引擎 ==================== */
        function setupVerticalRelayRace() {
            document.getElementById('race-title').innerText = "🔥 1600m 縱向直線折返接力大賽 (1~4棒往返跑)";
            document.getElementById('race-announcement').innerText = "第 1 棒就位（由上往下跑）！準備起跑！";
            
            relayStartTime = Date.now();
            relayTeams = [];

            // 1. 建立玩家代表隊
            const captain = poolRunners[0];
            relayTeams.push({
                name: "玩家代表隊", isUser: true, captain: captain,
                runners: JSON.parse(JSON.stringify(poolRunners)), 
                currentBaton: 0, currentLap: 1, yProgress: 20, direction: 1, 
                totalDistance: 0, isFinished: false, finishTime: 0, speedModifier: 1.02
            });

            // 2. 建立 5 支 NPC 代表隊
            const cpuTeamNames = ["京都極速隊", "秋葉原電玩隊", "大阪馬尾隊", "北海道風雪隊", "沖繩海浪隊"];
            for (let i = 0; i < 5; i++) {
                let cpuRunners = [];
                for(let b=0; b<4; b++){
                    let rId = Math.floor(Math.random() * totalRunners);
                    let row = Math.floor(rId / cols), col = rId % cols;
                    cpuRunners.push({ id: rId, name: `NPC-${rId+1}`, posX: (col/(cols-1))*100, posY: (row/(3-1))*100 });
                }
                relayTeams.push({
                    name: cpuTeamNames[i], isUser: false, captain: cpuRunners[0],
                    runners: cpuRunners, currentBaton: 0, currentLap: 1, yProgress: 20, direction: 1,
                    totalDistance: 0, isFinished: false, finishTime: 0, speedModifier: Math.random() * 0.12 + 0.94
                });
            }

            const trackContainer = document.getElementById('track-straight');
            trackContainer.innerHTML = '<div class="line-mark-top" style="top:25px;"></div><div class="line-mark-bottom" style="bottom:30px;"></div>';

            relayTeams.forEach((team, idx) => {
                const lane = document.createElement('div'); lane.className = 'lane';
                lane.innerHTML = `
                    <div class="lane-num">${idx + 1}</div>
                    <div class="runner-straight" id="runner-node-${idx}" style="top: 20px;">
                        <div class="avatar" id="avatar-img-${idx}" style="background-image: var(--bg-grid-0); background-position: ${team.runners[0].posX}% ${team.runners[0].posY}%;"></div>
                        <div class="lane-tag" id="lane-text-${idx}">${team.name}<br>(1棒/下行)</div>
                    </div>`;
                trackContainer.appendChild(lane);
            });

            setTimeout(runVerticalRelayEngine, 1000);
        }

        function runVerticalRelayEngine() {
            const track = document.getElementById('track-straight');
            const topLimit = 20;
            const bottomLimit = track.clientHeight - 105;
            let highestLap = 1;

            raceInterval = setInterval(() => {
                let allFinished = true;

                relayTeams.forEach((team, idx) => {
                    if (team.isFinished) return;
                    allFinished = false;

                    let speed = (Math.random() * 7 + 3.0) * team.speedModifier;
                    team.totalDistance += speed * 1.2; 

                    if (team.direction === 1) {
                        team.yProgress += speed;
                        if (team.yProgress >= bottomLimit) {
                            team.yProgress = bottomLimit;
                            triggerBatonHandover(team, idx); 
                        }
                    } else {
                        team.yProgress -= speed;
                        if (team.yProgress <= topLimit) {
                            team.yProgress = topLimit;
                            triggerBatonHandover(team, idx); 
                        }
                    }

                    const rNode = document.getElementById(`runner-node-${idx}`);
                    if (rNode) { rNode.style.top = team.yProgress + 'px'; }

                    if (team.currentLap > highestLap && !team.isFinished) {
                        highestLap = team.currentLap;
                    }
                });

                if (highestLap === 4 && currentBatonLap !== 4) {
                    updateSynthState('race', 4);
                }

                if (allFinished) {
                    clearInterval(raceInterval);
                    handleRelayRaceEnd();
                }
            }, 50);
        }

        function triggerBatonHandover(team, idx) {
            if (team.totalDistance >= 1600) {
                team.isFinished = true;
                team.finishTime = ((Date.now() - relayStartTime) / 1000).toFixed(2);
                document.getElementById(`lane-text-${idx}`).innerHTML = `${team.name}<br>🏁 完賽!`;
                return;
            }

            team.currentBaton++;
            team.currentLap = team.currentBaton + 1;
            team.direction = team.direction * -1; 

            const avaImg = document.getElementById(`avatar-img-${idx}`);
            const textTag = document.getElementById(`lane-text-${idx}`);
            let dirText = team.direction === 1 ? "下行" : "上行";

            if (team.currentBaton === 3) {
                avaImg.style.backgroundPosition = `${team.captain.posX}% ${team.captain.posY}%`;
                textTag.innerHTML = `${team.name}<br>⚡ <b>隊長壓軸 (${dirText})</b>`;
                if (team.isUser) {
                    document.getElementById('race-announcement').innerHTML = `🔥 <b>最後一棒交接！王牌隊長親自歸隊逆向暴衝！</b>`;
                }
            } else {
                const nextRunner = team.runners[team.currentBaton];
                avaImg.style.backgroundPosition = `${nextRunner.posX}% ${nextRunner.posY}%`;
                textTag.innerHTML = `${team.name}<br>(${team.currentLap}棒/${dirText})`;
                if (team.isUser) {
                    document.getElementById('race-announcement').innerHTML = `⚡ 玩家隊交棒！目前由 <b>第 ${team.currentLap} 棒 (${nextRunner.name})</b> 衝刺！`;
                }
            }

            avaImg.style.transform = "scale(1.3)";
            setTimeout(() => { avaImg.style.transform = "scale(1.0)"; }, 200);
        }

        function handleRelayRaceEnd() {
            const finalSorted = [...relayTeams].sort((a, b) => a.finishTime - b.finishTime);
            
            if (finalSorted[0].isUser) {
                poolRunners.forEach(r => { statsDB[r.id].gold += 1; });
            }
            poolRunners.forEach((r) => {
                const place = finalSorted.findIndex(t => t.isUser) + 1;
                const curBest = statsDB[r.id].bestPlace;
                if (curBest === '-' || place < parseInt(curBest)) {
                    statsDB[r.id].bestPlace = `接力第 ${place} 名`;
                }
            });
            localStorage.setItem('girl_athletes_hybrid_db_v3', JSON.stringify(statsDB));

            document.getElementById('race-announcement').innerHTML = `🎉 <b>1600m 直線往返接力大賽圓滿落幕！</b><br>第一名：🥇 ${finalSorted[0].name} (${finalSorted[0].finishTime}秒)`;
            const nextBtn = document.getElementById('next-stage-btn');
            nextBtn.innerText = "查看接力最終頒獎台"; nextBtn.classList.remove('hidden');
        }

        /* ==================== 🏆 結算顯示面板 ==================== */
        function showFinalPodiumDisplay(results) {
            document.getElementById('race-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            updateSynthState('lobby', 1);

            document.getElementById('result-header').innerText = gameMode === 'single' ? "🏆 個人決賽最終排名 🏆" : "🏆 1600m 大隊接力最終排名 🏆";

            const podium = document.getElementById('podium'); podium.innerHTML = '';
            const resultList = document.getElementById('result-list'); resultList.innerHTML = '<h3>名次總榜單：</h3>';

            if (gameMode === 'single') {
                results.forEach((runner, idx) => {
                    const place = idx + 1;
                    if (place <= 3) {
                        const pDiv = document.createElement('div'); pDiv.className = `podium-place`;
                        pDiv.style.order = place === 1 ? 2 : (place === 2 ? 1 : 3);
                        pDiv.innerHTML = `<div class="avatar" style="background-image: var(--bg-grid-0); background-position: ${runner.posX}% ${runner.posY}%;"></div>
                            <div class="podium-block p-${place}">${place}</div>`;
                        podium.appendChild(pDiv);
                    }
                    const rDiv = document.createElement('div'); rDiv.className = 'result-item';
                    rDiv.innerHTML = `<strong>第 ${place} 名</strong><div class="avatar" style="width:36px; height:36px; margin-left:10px; background-image: var(--bg-grid-0); background-position: ${runner.posX}% ${runner.posY}%;"></div><span>${runner.name}</span>`;
                    resultList.appendChild(rDiv);
                });
            } else {
                const sorted = [...relayTeams].sort((a, b) => a.finishTime - b.finishTime);
                sorted.forEach((team, idx) => {
                    const place = idx + 1;
                    if (place <= 3) {
                        const pDiv = document.createElement('div'); pDiv.className = `podium-place`;
                        pDiv.style.order = place === 1 ? 2 : (place === 2 ? 1 : 3);
                        pDiv.innerHTML = `<div class="avatar" style="background-image: var(--bg-grid-0); background-position: ${team.captain.posX}% ${team.captain.posY}%;"></div>
                            <div class="podium-block p-${place}" style="font-size:10px;">第${place}名<br>${team.name}</div>`;
                        podium.appendChild(pDiv);
                    }
                    const rDiv = document.createElement('div'); rDiv.className = 'result-item';
                    rDiv.innerHTML = `<strong>第 ${place} 名</strong><div class="avatar" style="width:34px; height:34px; margin-left:10px; background-image: var(--bg-grid-0); background-position: ${team.captain.posX}% ${team.captain.posY}%;"></div><span>${team.name}</span><b style="font-family:monospace; color:var(--dark);">${team.finishTime} 秒</b>`;
                    resultList.appendChild(rDiv);
                });
            }
        }

        function resetGame() {
            poolRunners.length = 0; qualifiedRunners.length = 0; currentGroupRunners.length = 0; relayTeams.length = 0;
            clearInterval(raceInterval);
            
            document.getElementById('result-view').className = 'view-panel hidden';
            document.getElementById('race-view').className = 'view-panel hidden';
            document.getElementById('setup-view').className = 'view-panel';
            document.getElementById('mode-selector-bar').className = 'mode-selector';
            
            updateSynthState('lobby', 1);
            updateSelectTip(); renderCharacterCards();
        }

        function clearData() {
            if(confirm("確定要刪除地端所有選手的歷史勝負數據嗎？")) { localStorage.removeItem('girl_athletes_hybrid_db_v3'); location.reload(); }
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(statsDB, null, 4));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `少女田徑綜合戰績庫_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(dl); dl.click(); dl.remove();
        }
        function importJSON(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const d = JSON.parse(e.target.result);
                    if (typeof d === 'object' && d['0']) {
                        statsDB = d; localStorage.setItem('girl_athletes_hybrid_db_v3', JSON.stringify(statsDB));
                        alert("🎉 數據還原成功！"); renderCharacterCards();
                    }
                } catch(c) { alert("檔案讀取失敗。"); }
            };
            reader.readAsText(file); input.value = '';
        }
    </script>
</body>
