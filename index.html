<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馬尾少女田徑錦標賽 (賽道圓框優化版)</title>
    <style>
        :root {
            --primary: #4CAF50;
            --dark: #2E7D32;
            --accent: #FFC107;
            --bg-grid-0: url('sport0.png'); /* 初始服裝 */
            --bg-grid-1: url('sport1.png'); /* 運動服裝 */
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f1;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { color: #333; margin: 5px 0 10px 0; font-size: 1.5rem; text-align: center; }
        .view-panel { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; position: relative;}
        .hidden { display: none !important; }
        h3 { font-size: 1.1rem; margin-top: 5px; color: #2e7d32; }
        p { font-size: 0.9rem; color: #666; margin: 5px 0; }

        /* 頂部控制列 */
        .top-control-bar {
            width: 100%; max-width: 700px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; background: #fff; padding: 8px 15px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .music-btn {
            background: #e0f2f1; border: 1px solid #b2dfdb; color: #00796b; padding: 6px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; cursor: pointer;
        }
        .db-action-group { display: flex; gap: 8px; }
        .db-btn { background: #f5f5f5; border: 1px solid #ccc; color: #333; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 500; }

        /* ================= 選手網格與翻轉/全螢幕核心 ================= */
        .grid-select {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 15px 0;
            perspective: 1200px;
        }
        @media (min-width: 500px) { .grid-select { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 680px) { .grid-select { grid-template-columns: repeat(7, 1fr); gap: 8px; } }

        /* 卡片容器 */
        .character-card {
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        top 0.5s, left 0.5s, width 0.5s, height 0.5s;
        }

        /* 狀態一：網格內的普通翻轉 */
        .character-card.flipped {
            transform: rotateY(180deg);
        }

        /* 狀態二：原位全螢幕展開 */
        .character-card.fullscreen {
            position: fixed;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            z-index: 9999;
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            border-radius: 8px; border: 2px solid #ddd; padding: 6px; background: #fafafa;
        }

        /* 正面普通狀態 */
        .card-front {
            z-index: 2; transform: rotateY(0deg);
            cursor: pointer;
        }
        .card-front .avatar {
            width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); display: inline-block; background-size: 700% 300%; background-repeat: no-repeat;
        }
        .character-card.selected .card-front { border-color: var(--accent); background: #fff8e1; }
        .card-front p { margin: 2px 0; font-size: 11px; font-weight: bold; color: #333;}

        /* 背面狀態 */
        .card-back {
            transform: rotateY(180deg);
            background: #fff;
        }

        /* 背面相片：預設在格子內是一般「方形相片」 */
        .card-back .avatar {
            width: 100%; height: 60px; 
            border-radius: 4px;
            background-size: 700% 300%; background-repeat: no-repeat;
            transition: all 0.5s ease;
        }

        /* 背面格子內數據 */
        .card-back .mini-stats {
            font-size: 9px; color: #555; text-align: left; width: 100%; line-height: 1.2; margin: 2px 0;
        }

        /* ================= 全螢幕樣式強烈覆蓋 ================= */
        .character-card.fullscreen .card-back {
            border: none !important;
            border-radius: 0 !important;
            background: #111 !important;
            cursor: zoom-out;
        }

        .character-card.fullscreen .card-back .avatar {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 0 !important;
            border: none !important;
            opacity: 0.85;
            z-index: 1;
        }

        /* 全螢幕下的高質感戰績浮層 */
        .stat-overlay {
            display: none;
            position: relative; z-index: 2;
            background: rgba(0, 0, 0, 0.75);
            padding: 25px 30px; border-radius: 16px;
            width: 85%; max-width: 400px;
            backdrop-filter: blur(5px); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            color: #fff; text-align: center;
            pointer-events: none;
        }
        .character-card.fullscreen .stat-overlay { display: block; }
        .character-card.fullscreen .mini-stats,
        .character-card.fullscreen .action-sub-btn { display: none !important; } 

        .card-back-title { font-size: 22px; font-weight: bold; color: var(--accent); margin: 0 0 15px 0; }
        .stat-text { margin: 8px 0; font-size: 15px; color: #e0e0e0; text-align: left; padding-left: 20%;}
        .stat-text span { color: #fff; font-weight: bold; font-size: 18px; font-family: monospace; }
        .close-tip { font-size: 12px; color: #aaa; margin-top: 15px; animation: blink 1.5s infinite; text-align: center;}

        @keyframes blink { 50% { opacity: 0.4; } }

        /* 按鈕群組 */
        .card-actions { display: flex; gap: 4px; width: 100%; justify-content: space-between; }
        .action-sub-btn { padding: 3px 0; font-size: 9px; border: none; border-radius: 4px; background: #e0e0e0; font-weight: bold; cursor: pointer; text-align: center;}
        .action-sub-btn.join-btn { background: var(--primary); color: white; width: 45%; }
        .action-sub-btn.flip-btn { background: #cfd8dc; color: #37474f; width: 45%; }
        .action-sub-btn.full-btn { background: #37474f; color: white; width: 100%; margin-top: 3px;}

        /* ==================== 跑道與賽道選手優化 ==================== */
        .status-announcement { background: #e8f5e9; border-left: 5px solid var(--primary); padding: 10px; margin: 10px 0; border-radius: 4px; text-align: left; font-size: 0.95rem; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 35px; font-size: 16px; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 300px; margin: 10px auto; display: block; }
        .btn:hover { background: var(--dark); }
        .btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        .track-container { background: #e0d0b0; padding: 0 10px; border-radius: 8px; margin: 15px 0; position: relative; overflow: hidden; width: 100%; height: 55vh; display: flex; justify-content: space-around; }
        .lane { flex: 1; margin: 0 2px; height: 100%; border-right: 2px dashed white; border-left: 2px dashed white; position: relative; background: #d15b3d; }
        .lane-num { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-weight: bold; font-size: 22px; z-index: 1; }
        
        /* 賽道跑手容器 */
        .runner { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); transition: top 0.1s linear; display: flex; flex-direction: column; align-items: center; z-index: 2; }
        
        /* ✨ 關鍵修復：讓賽道上的選手相片正確縮放到圓框大小、不扭曲變形 */
        .runner .avatar { 
            width: 50px; 
            height: 50px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); 
            border-radius: 50%; 
            border: 2px solid white;
            background-size: 700% 300%; 
            background-repeat: no-repeat;
        }
        
        .finish-line-mark { position: absolute; bottom: 60px; left: 0; width: 100%; height: 8px; background: repeating-linear-gradient(90deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 1; opacity: 0.8; }

        /* 頒獎台與結算 */
        .podium { display: flex; justify-content: center; align-items: flex-end; margin: 20px 0; height: 160px; }
        .podium-place { display: flex; flex-direction: column; align-items: center; margin: 0 8px; width: 75px; }
        .podium-place .avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid white; background-size: 700% 300%; background-repeat: no-repeat; }
        .podium-block { width: 100%; color: white; font-weight: bold; font-size: 20px; display: flex; justify-content: center; align-items: center; margin-top: 8px; border-radius: 6px 6px 0 0; }
        .p-1 { height: 80px; background: #ffd700; order: 2; }
        .p-2 { height: 60px; background: #c0c0c0; order: 1; }
        .p-3 { height: 40px; background: #cd7f32; order: 3; }
        
        .result-list { text-align: left; width: 100%; max-width: 400px; margin: 0 auto 15px auto; }
        .result-item { display: flex; align-items: center; padding: 10px 8px; border-bottom: 1px solid #eee; }
        .result-item strong { min-width: 60px; font-size: 0.9rem; }
        .result-item span { margin-left: 15px; font-weight: bold; font-size: 0.9rem; }
        .result-item .avatar { border-radius: 50%; background-size: 700% 300%; background-repeat: no-repeat; border: 1px solid #ccc; }
        .clear-db-btn { background: none; border: none; color: #ff5252; text-decoration: underline; font-size: 11px; cursor: pointer; margin-top: 15px; display: block; margin-left: auto; margin-right: auto;}
    </style>
</head>
<body>

    <h1>🏃‍♀️ 馬尾少女田徑錦標賽 🏁</h1>

    <div class="top-control-bar">
        <button class="music-btn" id="music-toggle-btn" onclick="toggleMusic()">🎵 音樂：關閉 🔇</button>
        <div class="db-action-group">
            <button class="db-btn" onclick="exportJSON()">📥 匯出生涯 JSON</button>
            <button class="db-btn" onclick="document.getElementById('import-input').click()">📤 匯入 JSON</button>
            <input type="file" id="import-input" accept=".json" class="hidden" onchange="importJSON(this)">
        </div>
    </div>

    <div id="setup-view" class="view-panel">
        <h3>【選手海選】請挑選 6 位選手參加預賽</h3>
        <p id="select-tip">目前已選擇：0 / 6 位</p>
        <div class="grid-select" id="grid-select"></div>
        <button id="start-btn" class="btn" disabled onclick="startQualifiers()">開始預賽 (第一組)</button>
        <button class="clear-db-btn" onclick="clearData()">⚠️ 清除所有選手歷史戰績</button>
    </div>

    <div id="race-view" class="view-panel hidden">
        <h3 id="race-title">預賽進行中...</h3>
        <div class="status-announcement" id="race-announcement">準備起跑...</div>
        <div class="track-container" id="track-container">
            <div class="finish-line-mark"></div>
        </div>
        <button id="next-stage-btn" class="btn hidden" onclick="advanceStage()">前進下一步驟</button>
    </div>

    <div id="result-view" class="view-panel hidden">
        <h2>🏆 決賽最終排名 🏆</h2>
        <p>（戰績已實時更新保存至地端選手卡中！）</p>
        <div class="podium" id="podium"></div>
        <div class="result-list" id="result-list"></div>
        <button class="btn" onclick="resetGame()">返回海選大廳</button>
    </div>

    <audio id="audio-lobby" loop src="bgm_lobby.mp3"></audio>
    <audio id="audio-race" loop src="bgm_race.mp3"></audio>

    <script>
        const totalRunners = 21;
        const cols = 7;
        const poolRunners = []; 
        let qualifiedRunners = []; 
        let currentGroupRunners = []; 
        let currentStage = 'Q1'; 
        let raceInterval;
        let isMusicMuted = true;

        let statsDB = JSON.parse(localStorage.getItem('girl_athletes_stats'));
        if (!statsDB) { initDefaultDB(); }

        function initDefaultDB() {
            statsDB = {};
            for (let i = 0; i < totalRunners; i++) {
                statsDB[i] = { matches: 0, qualified: 0, gold: 0, bestPlace: '-' };
            }
            localStorage.setItem('girl_athletes_stats', JSON.stringify(statsDB));
        }

        const gridSelect = document.getElementById('grid-select');
        renderCharacterCards();

        function renderCharacterCards() {
            gridSelect.innerHTML = '';
            for (let i = 0; i < totalRunners; i++) {
                const r = Math.floor(i / cols);
                const c = i % cols;
                const posX = (c / (cols - 1)) * 100;
                const posY = (r / (3 - 1)) * 100;

                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'character-card';
                cardWrapper.id = `card-wrapper-${i}`;
                cardWrapper.dataset.id = i;

                const s = statsDB[i] || { matches: 0, qualified: 0, gold: 0, bestPlace: '-' };

                cardWrapper.innerHTML = `
                    <div class="card-front" onclick="flipCard(event, ${i})">
                        <div class="avatar" style="background-image: var(--bg-grid-0); background-position: ${posX}% ${posY}%;"></div>
                        <p>${i+1}號選手</p>
                        <div style="width:100%;" onclick="event.stopPropagation();">
                            <div class="card-actions">
                                <button class="action-sub-btn join-btn" onclick="handleSelect(event, ${i})">參賽</button>
                                <button class="action-sub-btn flip-btn" onclick="flipCard(event, ${i})">翻轉</button>
                            </div>
                            <button class="action-sub-btn full-btn" onclick="goFullscreen(event, ${i})">🔎 全畫面方形</button>
                        </div>
                    </div>
                    <div class="card-back" onclick="handleBackClick(event, ${i})">
                        <div class="avatar" style="background-image: var(--bg-grid-1); background-position: ${posX}% ${posY}%;"></div>
                        <div class="mini-stats">
                            場:${s.matches} 晉:${s.qualified}<br>冠:${s.gold} 最佳:${s.bestPlace}
                        </div>
                        <div class="stat-overlay">
                            <p class="card-back-title">🏃‍♀️ ${i+1}號 生涯戰績總覽</p>
                            <div class="stat-text">出賽次數：<span id="stat-m-${i}">${s.matches}</span> 次</div>
                            <div class="stat-text">決賽晉級：<span id="stat-q-${i}">${s.qualified}</span> 次</div>
                            <div class="stat-text">奪冠冠軍：<span id="stat-g-${i}">${s.gold}</span> 次</div>
                            <div class="stat-text">最高名次：<span id="stat-b-${i}">${s.bestPlace}</span></div>
                            <div class="close-tip">【 點擊螢幕任意處縮回網格 】</div>
                        </div>
                        <button class="action-sub-btn flip-btn" style="width:100%;" onclick="event.stopPropagation(); flipCard(event, ${i})">返回正面</button>
                    </div>
                `;
                gridSelect.appendChild(cardWrapper);
            }
        }

        function flipCard(event, id) {
            if (event) event.stopPropagation();
            const card = document.getElementById(`card-wrapper-${id}`);
            if (card.classList.contains('fullscreen')) return;
            card.classList.toggle('flipped');
        }

        function handleBackClick(event, id) {
            event.stopPropagation();
            const card = document.getElementById(`card-wrapper-${id}`);
            if (card.classList.contains('fullscreen')) {
                card.classList.remove('fullscreen');
            } else {
                card.classList.remove('flipped');
            }
        }

        function goFullscreen(event, id) {
            event.stopPropagation();
            const card = document.getElementById(`card-wrapper-${id}`);
            card.classList.add('fullscreen');
        }

        function handleSelect(event, id) {
            event.stopPropagation();
            const card = document.getElementById(`card-wrapper-${id}`);
            const index = poolRunners.findIndex(r => r.id === id);

            const r = Math.floor(id / cols);
            const c = id % cols;
            const posX = (c / (cols - 1)) * 100;
            const posY = (r / (3 - 1)) * 100;

            if (index > -1) {
                poolRunners.splice(index, 1);
                card.classList.remove('selected');
            } else {
                if (poolRunners.length >= 6) return; 
                poolRunners.push({ id, name: `${id+1}號選手`, posX, posY, progress: 20 });
                card.classList.add('selected');
            }
            document.getElementById('select-tip').innerText = `目前已選擇：${poolRunners.length} / 6 位`;
            document.getElementById('start-btn').disabled = poolRunners.length !== 6;
            playMusicByState();
        }

        /* 🎵 音樂系統 */
        function toggleMusic() {
            isMusicMuted = !isMusicMuted;
            const btn = document.getElementById('music-toggle-btn');
            if (isMusicMuted) {
                btn.innerText = "🎵 音樂：關閉 🔇";
                document.getElementById('audio-lobby').pause();
                document.getElementById('audio-race').pause();
            } else {
                btn.innerText = "🎵 音樂：開啟 🔊";
                playMusicByState();
            }
        }

        function playMusicByState() {
            if (isMusicMuted) return;
            const lobbyAudio = document.getElementById('audio-lobby');
            const raceAudio = document.getElementById('audio-race');
            if (document.getElementById('race-view').classList.contains('hidden')) {
                raceAudio.pause();
                if (lobbyAudio.paused) lobbyAudio.play().catch(()=>{});
            } else {
                lobbyAudio.pause();
                if (raceAudio.paused) raceAudio.play().catch(()=>{});
            }
        }

        /* JSON 匯入匯出 */
        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(statsDB, null, 4));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `馬尾少女錦標賽生涯戰績_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importJSON(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (typeof importedData === 'object' && importedData['0'] && 'matches' in importedData['0']) {
                        statsDB = importedData;
                        localStorage.setItem('girl_athletes_stats', JSON.stringify(statsDB));
                        alert("🎉 歷史生涯戰績匯入成功！數據已成功同步。");
                        renderCharacterCards();
                    } else { alert("❌ 檔案格式不符。"); }
                } catch (err) { alert("❌ 檔案讀取出錯。"); }
            };
            reader.readAsText(file);
            input.value = '';
        }

        /* 賽跑核心 */
        function startQualifiers() {
            poolRunners.forEach(runner => { statsDB[runner.id].matches += 1; });
            saveDB();
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('race-view').classList.remove('hidden');
            playMusicByState();
            setupRaceStage('Q1');
